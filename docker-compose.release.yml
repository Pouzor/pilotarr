# docker-compose.release.yml — for end-users installing Pilotarr
# Uses pre-built images from ghcr.io (no local build required)
#
# Quick install:
#   curl -O https://raw.githubusercontent.com/Pouzor/pilotarr/main/docker-compose.release.yml
#   curl -O https://raw.githubusercontent.com/Pouzor/pilotarr/main/.env.example
#   cp .env.example .env  # edit secrets
#   docker compose -f docker-compose.release.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: pilotarr-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pilotarr-network

  backend:
    image: ghcr.io/pouzor/pilotarr-backend:latest
    container_name: pilotarr-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      API_KEY: ${API_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      DEBUG: ${DEBUG:-false}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-pilotarr}
    depends_on:
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pilotarr-network

  frontend:
    image: ghcr.io/pouzor/pilotarr-frontend:latest
    container_name: pilotarr-frontend
    restart: unless-stopped
    ports:
      - "${PILOTARR_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - pilotarr-network

volumes:
  mysql_data: {}

networks:
  pilotarr-network: {}
